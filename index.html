<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Linktree</title>
    
    <!-- Google Fonts for professional typography -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;500;700&family=Space+Grotesk:wght@400;700&display=swap" rel="stylesheet">

    <style>
        /* --- CSS VARIABLES & RESET --- */
        :root {
            --bg-color: #0f172a;
            --card-bg: rgba(30, 41, 59, 0.7);
            --text-primary: #f8fafc;
            --text-secondary: #94a3b8;
            --accent: #38bdf8; /* Light Blue */
            --accent-glow: rgba(56, 189, 248, 0.3);
            --btn-hover: #0284c7;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Outfit', sans-serif;
            background-color: var(--bg-color);
            /* Subtle animated background gradient */
            background-image: 
                radial-gradient(at 0% 0%, hsla(253,16%,7%,1) 0, transparent 50%), 
                radial-gradient(at 50% 0%, hsla(225,39%,30%,1) 0, transparent 50%), 
                radial-gradient(at 100% 0%, hsla(339,49%,30%,1) 0, transparent 50%);
            color: var(--text-primary);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            overflow-x: hidden;
        }

        /* --- LAYOUT --- */
        .container {
            width: 90%;
            max-width: 480px;
            text-align: center;
            padding: 2rem;
            /* Glassmorphism Effect */
            background: rgba(255, 255, 255, 0.03);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.08);
            border-radius: 24px;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
            animation: fadeIn 1s ease-out;
        }

        /* --- HEADER SECTION --- */
        .profile-section {
            margin-bottom: 2.5rem;
        }

        .avatar {
            width: 96px;
            height: 96px;
            border-radius: 50%;
            background: linear-gradient(135deg, var(--accent), #818cf8);
            margin: 0 auto 1rem;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 2rem;
            font-weight: 700;
            color: white;
            border: 4px solid rgba(255,255,255,0.1);
            box-shadow: 0 0 20px var(--accent-glow);
        }

        h1 {
            font-family: 'Space Grotesk', sans-serif;
            font-size: 1.75rem;
            font-weight: 700;
            letter-spacing: -0.5px;
            margin-bottom: 0.5rem;
        }

        .bio {
            color: var(--text-secondary);
            font-size: 0.95rem;
            font-weight: 300;
        }

        /* --- LINKS LIST --- */
        .links-list {
            display: flex;
            flex-direction: column;
            gap: 1rem;
        }

        .link-btn {
            position: relative;
            display: flex;
            align-items: center;
            justify-content: center;
            width: 100%;
            padding: 1rem 1.5rem;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 16px;
            color: var(--text-primary);
            text-decoration: none;
            font-weight: 500;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            overflow: hidden;
        }

        .link-btn:hover {
            background: rgba(255, 255, 255, 0.1);
            border-color: var(--accent);
            transform: translateY(-2px) scale(1.02);
            box-shadow: 0 10px 20px -5px rgba(0, 0, 0, 0.3);
        }

        .link-btn:active {
            transform: translateY(0) scale(0.98);
        }

        /* --- FOOTER --- */
        footer {
            margin-top: 2rem;
            font-size: 0.8rem;
            color: rgba(255,255,255,0.3);
        }

        /* --- ANIMATIONS --- */
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* Mobile Tweaks */
        @media (max-width: 400px) {
            .container { width: 100%; border-radius: 0; height: 100vh; justify-content: center; display: flex; flex-direction: column;}
        }
    </style>
</head>
<body>

    <div class="container">
        <!-- Header Area -->
        <div class="profile-section">
            <!-- Your Initials or Image here -->
            <div class="avatar">AH</div>
            
            <!-- CHANGE YOUR NAME HERE -->
            <h1>Anthony Hnein</h1>
            
            <!-- CHANGE YOUR BIO HERE -->
            <p class="bio"></p>
        </div>

        <!-- Buttons Area -->
        <div class="links-list" id="links-container">
            <!-- Buttons will be injected here by JavaScript -->
        </div>

        <footer>
            © <span id="year"></span> Anthony Hnein. All rights reserved.
        </footer>
    </div>

    <script>
        // --- CONFIGURATION ---
        
        // 1. Define your websites here
        // Format: { name: "Button Text", url: "https://..." }
        const myWebsites = [
            { 
                name: "Main Portfolio", 
                url: "https://ahnein1.github.io/CV", 
                 
            },
            { 
                name: "Dive LogBook", 
                url: "https://ahnein1.github.io/DiveLogBook", 
                 
            },
            { 
                name: "DJ Profile", 
                url: "https://audius.co/dj_antho", 
            
            },
            { 
                name: "Professional Scoreboard", 
                url: "https://ahnein1.github.io/SB", 
                
            },
            { 
                name: "Verses Book", 
                url: "https://ahnein1.github.io/VB", 
                 
            },
            { 
                name: "SAT Math Files", 
                url: "https://1drv.ms/f/c/9E7B6CE6100CA979/IgBBCJrW4v-7RYKRI_fHA51IAen1qVTesHZuPDyEZnRvvgQ?e=d9dRN8"
                
            }
        ];

        // --- LOGIC (DO NOT EDIT BELOW UNLESS YOU KNOW CODING) ---

        const container = document.getElementById('links-container');
        document.getElementById('year').textContent = new Date().getFullYear();

        // Function to generate buttons (No Icons)
        myWebsites.forEach(site => {
            const a = document.createElement('a');
            a.href = site.url;
            a.target = "_blank"; // Opens in new tab
            a.rel = "noopener noreferrer"; // Security best practice
            a.className = "link-btn";
            
            // HTML content for the button (Text only)
            a.innerHTML = `<span>${site.name}</span>`;

            container.appendChild(a);
        });
    </script>
</body>
</html>
